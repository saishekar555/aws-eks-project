name: EKS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: saishekar555/devops-portfolio
  APP_NAMESPACE: devops
  DEPLOYMENT_NAME: portfolio
  CONTAINER_NAME: portfolio
  AWS_REGION: ap-south-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        uses: aws-actions/eks-kubectl@v2
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ env.AWS_REGION }}
          kubectl-version: '1.30'

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/deployment.yaml

      - name: Update deployment image and rollout
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ env.APP_NAMESPACE }}
          if ! kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.APP_NAMESPACE }} --timeout=300s; then
            kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.APP_NAMESPACE }}
            exit 1
          fi
