apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: devops
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/part-of: devops-portfolio
spec:
  type: LoadBalancer
  selector:
    app: portfolio
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http